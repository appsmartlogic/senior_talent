{% extends 'talent_app/base.html' %}

{% block title %}Pago cancelado · SeniorTalent{% endblock %}

{% block extra_css %}
<style>
  .cancelado-wrap {
    max-width: 560px;
    margin: 60px auto;
    padding: 0 24px;
    text-align: center;
  }
  .cancelado-icono {
    width: 80px;
    height: 80px;
    background: #FAEEDA;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    margin: 0 auto 24px;
  }
  .cancelado-card {
    background: #fff;
    border: 1px solid #e5e5e3;
    border-radius: 12px;
    padding: 40px;
  }
  .cancelado-card h1 {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 8px;
    color: #1a1a1a;
  }
  .cancelado-card p {
    font-size: 15px;
    color: #666;
    margin-bottom: 28px;
    line-height: 1.6;
  }
  .acciones {
    display: flex;
    gap: 12px;
    justify-content: center;
  }
</style>
{% endblock %}

{% block content %}
<div class="cancelado-wrap">
  <div class="cancelado-card">
    <div class="cancelado-icono">✕</div>

    <h1>Pago cancelado</h1>
    <p>No se realizó ningún cargo. Puedes intentarlo de nuevo
    cuando quieras.</p>

    <div class="acciones">
      <a href="{% url 'directorio' %}" class="btn btn-primary">
        Volver al directorio
      </a>
      <a href="{% url 'empresa_candidatos' %}" class="btn btn-outline">
        Mis candidatos
      </a>
    </div>
  </div>
</div>
{% endblock %}
